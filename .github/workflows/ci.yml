name: Automação de Testes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  api:
    name: Testes de API
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências dos testes de API
        run: pip install -r requirements.txt
        working-directory: Testes-API

      - name: Executar testes de API
        run: pytest testes/ -v
        working-directory: Testes-API

  web:
    name: Testes Web
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências dos testes de web
        run: pip install -r requirements.txt
        working-directory: Testes-Web

      - name: Executar testes Web
        run: pytest testes/ -v
        working-directory: Testes-Web